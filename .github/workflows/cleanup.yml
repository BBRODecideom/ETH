name: Cleanup PR Schemas

on:
  schedule:
    - cron: "0 2 * * *"  # daily 02:00 UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    environment: DBT_ETH

    env:
      DBT_PRIVATE_KEY: ${{ secrets.DBT_PRIVATE_KEY }}
      DBT_PRIVATE_KEY_PATH: /home/runner/.dbt/rsa_key.p8
      DBT_ACCOUNT: ${{ secrets.DBT_ACCOUNT }}
      DBT_USER: ${{ secrets.DBT_USER }}
      DBT_ROLE: ${{ secrets.DBT_ROLE }}
      DBT_SCHEMA: PUBLIC
    
    steps:
        - name: Checkout repo
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.12.10"

        - name: Install dbt
          run: pip install "dbt-core>=2.0.0a1" "dbt-snowflake>=1.12.0b1" --pre

        - name: Set up dbt profile + private key
          run: |
            mkdir -p ~/.dbt
            cp .dbt/profiles.yml ~/.dbt/profiles.yml
            echo "$DBT_PRIVATE_KEY" > ~/.dbt/rsa_key.p8
            chmod 600 ~/.dbt/rsa_key.p8
        - name: Cleanup
          run: |
            dbt run-operation pr_schema_cleanup --target ci --args "{'database_to_clean': 'DECIDEOM_LYON','age_in_days': -1}"

