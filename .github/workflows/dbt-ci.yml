name: dbt CI

on:
  pull_request:
    branches:
      - master

jobs:
  dbt-run:
    runs-on: ubuntu-latest
    environment: DBT_ETH

    env:
      DBT_PRIVATE_KEY: ${{ secrets.DBT_PRIVATE_KEY }}
      DBT_PRIVATE_KEY_PATH: /home/runner/.dbt/rsa_key.p8
      DBT_ACCOUNT: ${{ secrets.DBT_ACCOUNT }}
      DBT_USER: ${{ secrets.DBT_USER }}
      DBT_ROLE: ${{ secrets.DBT_ROLE }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          # Older verion of dbt used at the beginning of this course 
          # pip install dbt-core==1.9.4 dbt-snowflake==1.9.4
          # Trying with newest version (big changes) be carefull we need to match local version and ci/cd version
          # Please
          pip install "dbt-core>=2.0.0a1" "dbt-snowflake>=1.12.0b1" --pre

      - name: Set up dbt profile + private key
        run: |
          mkdir -p ~/.dbt
          cp .dbt/profiles.yml ~/.dbt/profiles.yml
          echo "$DBT_PRIVATE_KEY" > ~/.dbt/rsa_key.p8
          chmod 600 ~/.dbt/rsa_key.p8

      - name: Install dbt deps
        run: dbt deps

      - name: Run dbt debug
        run: dbt debug --target ci


    #  Start bulding slim ci
      - name: Create state manifest from master
        run: |
          # Force la suppression de toutes les modifications locales du pipeline
          git reset --hard HEAD
          git clean -fd
          git checkout master
          dbt deps
          dbt parse --target prod
          mkdir -p state
          cp target/manifest.json state/manifest.json
          git checkout

    # clone incremental first
      - name: Clone impacted incremental models into PR schema
        run: |
          dbt clone \
          --target ci \
          --state ./state \
          --defer \
          --select "state:modified+,config.materialized:incremental,state:old"

    # Then slim build
      - name: Slim build (modified + downstream)
        run: |
          dbt build \
          --target ci \
          --state ./state \
          --defer \
          --select "state:modified+"

  